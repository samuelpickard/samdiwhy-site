<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Sam DiWhy</title>
  <script>
    const KEY = 'NCRjb3JlJnR3ZW50eSEh';
    function tryUnlock() {
      const input = document.getElementById('pw-input').value;
      if (btoa(input) === KEY) {
        localStorage.setItem('sdw_unlocked', KEY);
        document.getElementById('gate').remove();
        document.getElementById('main-content').style.display = '';
      } else {
        document.getElementById('pw-error').textContent = 'Wrong password.';
        document.getElementById('pw-input').value = '';
        document.getElementById('pw-input').focus();
      }
    }
    window.addEventListener('DOMContentLoaded', () => {
      if (localStorage.getItem('sdw_unlocked') === KEY) {
        document.getElementById('gate').remove();
        document.getElementById('main-content').style.display = '';
      }
    });
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --accent: #e8a020;
      --text: #e8e8e8;
      --muted: #888;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }

    header {
      max-width: 800px;
      margin: 0 auto 3rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }

    .site-name {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
    }

    .breadcrumb {
      color: var(--muted);
      font-size: 0.9rem;
    }

    main {
      max-width: 800px;
      margin: 0 auto;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    h2 {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .filters {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      padding: 0.25rem 0.75rem;
      text-transform: uppercase;
      transition: border-color 0.15s, color 0.15s;
    }

    .filter-btn:hover, .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    .post-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .post-item {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: baseline;
      gap: 1rem;
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
    }

    .post-item:hover .post-title {
      color: var(--accent);
    }

    .post-title {
      font-size: 1rem;
      font-weight: 500;
      transition: color 0.15s;
    }

    .post-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    .post-category {
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.7;
    }

    .post-date {
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .empty-state {
      color: var(--muted);
      font-size: 0.9rem;
      padding: 2rem 0;
    }

    footer {
      max-width: 800px;
      margin: 4rem auto 0;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* Gate */
    #gate {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      z-index: 999;
    }
    #gate .gate-label { font-size: 0.85rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
    #gate input { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 1rem; padding: 0.6rem 1rem; outline: none; width: 220px; text-align: center; }
    #gate input:focus { border-color: var(--accent); }
    #gate button { background: var(--accent); border: none; border-radius: 6px; color: #000; cursor: pointer; font-size: 0.85rem; font-weight: 700; padding: 0.5rem 1.25rem; }
    #pw-error { font-size: 0.8rem; color: #e05555; min-height: 1rem; }
  </style>
</head>
<body>

  <div id="gate">
    <div class="gate-label">Sam DiWhy</div>
    <input id="pw-input" type="password" placeholder="password" autofocus onkeydown="if(event.key==='Enter')tryUnlock()" />
    <button onclick="tryUnlock()">Enter</button>
    <div id="pw-error"></div>
  </div>

  <div id="main-content" style="display:none">
    <header>
      <a class="site-name" href="/">Sam DiWhy</a>
      <span class="breadcrumb">/ Blog</span>
    </header>

    <main>
      <div class="section-header">
        <h2>Posts</h2>
        <div class="filters">
          <button class="filter-btn active" onclick="filterPosts('all', this)">All</button>
          <button class="filter-btn" onclick="filterPosts('cooking', this)">Cooking</button>
          <button class="filter-btn" onclick="filterPosts('baseball', this)">Baseball</button>
        </div>
      </div>

      <div class="post-list" id="post-list">
        <!-- Posts go here. Example structure (uncomment when first post is added):
        <a class="post-item" href="/blog/post-slug" data-category="cooking">
          <span class="post-title">Post Title Here</span>
          <span class="post-meta">
            <span class="post-category">Cooking</span>
            <span class="post-date">Apr 2026</span>
          </span>
        </a>
        -->
        <a class="post-item" href="/blog/little-league-welcome" data-category="baseball">
          <span class="post-title">Season Kick-off! Welcome to PickardBaseball.com</span>
          <span class="post-meta">
            <span class="post-category">Baseball</span>
            <span class="post-date">Apr 2026</span>
          </span>
        </a>
        <a class="post-item" href="/blog/dark-lager-griddle-tacos" data-category="cooking">
          <span class="post-title">Dark Lager Griddle Tacos</span>
          <span class="post-meta">
            <span class="post-category">Cooking</span>
            <span class="post-date">Apr 2026</span>
          </span>
        </a>
        <a class="post-item" href="/blog/homestead-pastitsio" data-category="cooking">
          <span class="post-title">Homestead Pastitsio</span>
          <span class="post-meta">
            <span class="post-category">Cooking</span>
            <span class="post-date">Apr 2026</span>
          </span>
        </a>
      </div>
    </main>

    <footer>
      &copy; 2026 Sam DiWhy &mdash; samdiwhy.com
    </footer>
  </div>

  <script>
    function filterPosts(category, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.post-item').forEach(item => {
        item.style.display = (category === 'all' || item.dataset.category === category) ? '' : 'none';
      });
    }
  </script>

</body>
</html>
