<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sam DiWhy — Tools I Built Myself</title>
  <script>
    const KEY = 'NCRjb3JlJnR3ZW50eSEh';
    function tryUnlock() {
      const input = document.getElementById('pw-input').value;
      if (btoa(input) === KEY) {
        localStorage.setItem('sdw_unlocked', KEY);
        document.getElementById('gate').remove();
        document.getElementById('main-content').style.display = '';
      } else {
        document.getElementById('pw-error').textContent = 'Wrong password.';
        document.getElementById('pw-input').value = '';
        document.getElementById('pw-input').focus();
      }
    }
    window.addEventListener('DOMContentLoaded', () => {
      if (localStorage.getItem('sdw_unlocked') === KEY) {
        document.getElementById('gate').remove();
        document.getElementById('main-content').style.display = '';
      }
    });
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --accent: #e8a020;
      --text: #e8e8e8;
      --muted: #888;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }

    header {
      max-width: 800px;
      margin: 0 auto 3rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .site-name {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .tagline {
      margin-top: 0.4rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    main {
      max-width: 800px;
      margin: 0 auto;
    }

    h2 {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    .tool-card {
      display: block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, background 0.15s;
    }

    .tool-card:hover {
      border-color: var(--accent);
      background: #1e1e1e;
    }

    .tool-card h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }

    .tool-card p {
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .tool-card .arrow {
      display: inline-block;
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    .tool-card .card-links {
      display: flex;
      gap: 1.25rem;
      margin-top: 0.75rem;
    }

    .tool-card .card-links a {
      font-size: 0.8rem;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 0.05em;
    }

    .tool-card .card-links a:hover {
      text-decoration: underline;
    }

    .tool-card .card-links a.secondary {
      opacity: 0.6;
    }

    footer {
      max-width: 800px;
      margin: 4rem auto 0;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--muted);
    }

    #gate {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      z-index: 999;
    }

    #gate .gate-label {
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #gate input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 1rem;
      padding: 0.6rem 1rem;
      outline: none;
      width: 220px;
      text-align: center;
    }

    #gate input:focus { border-color: var(--accent); }

    #gate button {
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: #000;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 0.5rem 1.25rem;
    }

    #pw-error {
      font-size: 0.8rem;
      color: #e05555;
      min-height: 1rem;
    }
  </style>
</head>
<body>

  <div id="gate">
    <div class="gate-label">Sam DiWhy</div>
    <input id="pw-input" type="password" placeholder="password" autofocus onkeydown="if(event.key==='Enter')tryUnlock()" />
    <button onclick="tryUnlock()">Enter</button>
    <div id="pw-error"></div>
  </div>

  <div id="main-content" style="display:none">
  <header>
    <div class="site-name">Sam DiWhy</div>
    <div class="tagline">Tools I built myself, for myself.</div>
  </header>

  <main>
    <h2>Tools</h2>
    <div class="tools-grid">

      <div class="tool-card">
        <h3>Little League Tracker</h3>
        <p>Stats and standings for the Pickard Baseball league. Live scores, batting averages, and team records.</p>
        <div class="card-links">
          <a href="https://pickardbaseball.com" target="_blank" rel="noopener">Scoreboard &rarr;</a>
          <a href="https://pickardbaseball.com/gametime" target="_blank" rel="noopener" class="secondary">Scorekeeper &rarr;</a>
        </div>
      </div>

    </div>
  </main>

  <footer>
    &copy; 2026 Sam DiWhy &mdash; samdiwhy.com
  </footer>
  </div>

</body>
</html>
